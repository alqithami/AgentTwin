experiment:
  name: quick
  seeds: [0]
  n_eval_episodes: 3
  scenario_set: minimal

env:
  tep_backend: python
  control_interval_sec: 6
  scheduling_interval_sec: 300
  episode_length_sec: 3600
  residual_max: 10.0
  warmup_sec: 0
  pi_update_interval_sec: 1
  use_safety_shield: true
  safety_shield_type: qp   # qp | heuristic | off
  qp_shield:
    alpha: 0.20
    lambda_reg: 0.001
  # Reward shaping / scheduling penalties
  reward:
    # scheduling-level penalties (TEPSchedulingEnv)
    demand_mismatch: 5.0
    mode_switch: 0.10

training:
  controller:
    train_centralized: true
    train_multi_agent: true
    sac_steps: 20000
    rounds: 1
  scheduler:
    enabled: true
    ppo_steps: 20000

evaluation:
  include_ablation_no_shield: true
  save_episode_traces: false
